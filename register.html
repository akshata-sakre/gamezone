<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameZone | Register</title>
<style>
body {
  min-height: 100vh;
  margin: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle at top, #020617, #000);
  font-family: 'Poppins', sans-serif;
}


    .register-container {
  background: #020617;
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 0 30px rgba(34,211,238,0.6);
  width: 340px;
  text-align: center;
}

.register-container h2 {
  color: #22d3ee;
  margin-bottom: 25px;
}

.register-container input {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #020617;
  color: #fff;
  box-shadow: inset 0 0 10px rgba(0,0,0,0.7);
}

.register-container button {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #22d3ee, #0ea5e9);
  color: #000;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.3s;
}

.register-container button:hover {
  transform: scale(1.05);
}

.login-text {
  margin-top: 15px;
  color: #94a3b8;
}

.login-text a {
  color: #22d3ee;
  text-decoration: none;
}

.login-text a:hover {
  text-decoration: underline;
}

</style>
</head>
<body>

  <div class="register-container">
    <h2>Create Account</h2>

    <form>
      <!-- Username -->
      <input 
        type="email"
        placeholder="Email (example@gmail.com)"
        pattern=".+@gmail\.com"
        title="Email must end with @gmail.com"
        required
      >

      <!-- Password -->
      <input 
        type="password"
        placeholder="Password (min 8 characters)"
        minlength="8"
        required
      >

      <!-- Confirm Password -->
      <input 
        type="password"
        placeholder="Confirm Password"
        minlength="8"
        required
      >

      <button type="submit">Register</button>
    </form>

    <p class="login-text">
      Already a player?
      <a href="login.html">Login here</a>
    </p>
  </div>

</body>
</html>
