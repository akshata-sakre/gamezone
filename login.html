<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameZone | Login</title>
<style>
    body {
  background: radial-gradient(circle, #020617, #000);
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.login-container {
  background: #020617;
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 0 30px rgba(56,189,248,0.6);
  width: 320px;
  text-align: center;
}

.login-container h2 {
  color: #38bdf8;
  margin-bottom: 25px;
}

.login-container input {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #020617;
  color: #fff;
  box-shadow: inset 0 0 10px rgba(0,0,0,0.7);
}

.login-container button {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #38bdf8, #0ea5e9);
  color: #000;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.3s;
}

.login-container button:hover {
  transform: scale(1.05);
}

.register-text {
  margin-top: 15px;
  color: #94a3b8;
}

.register-text a {
  color: #38bdf8;
  text-decoration: none;
}

.register-text a:hover {
  text-decoration: underline;
}

</style>
</head>
<body>

  <div class="login-container">
    <h2>Player Login</h2>

    <form>
      <!-- Username -->
      <input 
        type="email"
        placeholder="Username (example@gmail.com)"
        pattern=".+@gmail\.com"
        title="Username must end with @gmail.com"
        required
      >

      <!-- Password -->
      <input 
        type="password"
        placeholder="Password (min 8 characters)"
        minlength="8"
        required
      >

      <button type="submit">Login</button>
    </form>

    <p class="register-text">
      New player?
      <a href="register.html">Create an account</a>
    </p>
  </div>




</body>
</html>
